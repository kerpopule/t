<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0420">
  <title>SYNTHWAVE · POMODORO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="sky"></div>
  <div class="grid"></div>
  <div class="sun"></div>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <main class="app">
    <header class="hud">
      <div class="logo">
        <span class="dot"></span>
        <span class="logo-text">POMO<span class="accent">·WAVE</span></span>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-label">SESSION</div>
          <div class="stat-value" id="sessionCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">FOCUS</div>
          <div class="stat-value" id="focusMinutes">0<span class="unit">m</span></div>
        </div>
      </div>
    </header>

    <section class="dial-wrap">
      <div class="dial" id="dial">
        <svg viewBox="0 0 220 220" class="ring">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ff2bd6"/>
              <stop offset="50%" stop-color="#a64bff"/>
              <stop offset="100%" stop-color="#00f0ff"/>
            </linearGradient>
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <circle cx="110" cy="110" r="98" class="ring-track"/>
          <circle cx="110" cy="110" r="98" class="ring-progress" id="ringProgress"/>
        </svg>

        <div class="dial-inner">
          <div class="mode" id="modeLabel">FOCUS</div>
          <button class="time" id="timeDisplay" aria-label="Change duration">
            25:00
          </button>
          <div class="status" id="statusLabel">READY</div>
        </div>
      </div>
    </section>

    <section class="controls">
      <button class="btn btn-primary" id="startBtn">
        <span class="btn-icon">▶</span>
        <span class="btn-label">START</span>
      </button>
      <button class="btn btn-ghost" id="resetBtn" aria-label="Reset">
        <span class="btn-icon">↻</span>
      </button>
      <button class="btn btn-ghost" id="skipBtn" aria-label="Skip phase">
        <span class="btn-icon">⏭</span>
      </button>
    </section>

    <section class="presets">
      <button class="preset" data-min="25">25 / 5</button>
      <button class="preset active" data-min="50">50 / 10</button>
      <button class="preset" data-min="90">90 / 20</button>
    </section>

    <footer class="footer">
      <span class="hint">tap time · long-press to edit</span>
    </footer>
  </main>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
